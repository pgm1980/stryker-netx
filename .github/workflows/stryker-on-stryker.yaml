name: Stryker on Stryker

# Sprint 24 (v2.11.0): Pillar-A Closing — dogfood workflow operational.
# Stryker mutates its own production source tree against the Sprint 18+19+20+22
# test suites. Workflow runs nightly and on manual dispatch.
#
# Default uses USE_LOCAL_TOOL=true: pack-install Stryker.CLI from source as a
# tool-path-local install. The NuGet form (`dotnet-stryker-netx` from NuGet.org)
# is not yet available; switch the default to `false` once the tool is published.

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      useLocalTool:
        description: 'Pack and use local Stryker CLI (default true; set false once dotnet-stryker-netx is published to NuGet)'
        type: boolean
        required: false
        default: true
  # When modifying the workflow, enable pull_request locally to test —
  # disabled in main to avoid running this on every PR.
  # pull_request:

concurrency:
  group: stryker-on-stryker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-stryker:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Sprint 24: workingDirectory paths follow the stryker-netx flat
        # structure (src/<Module>/<Module>.csproj), NOT upstream's extra-nested
        # layout (src/Stryker.CLI/Stryker.CLI/Stryker.CLI.csproj). Keeping the
        # 11-module roster from upstream verbatim — Stryker.NET production
        # parity contract.
        include:
          - name: Stryker.Abstractions
            workingDirectory: src/Stryker.Abstractions
          - name: Stryker.CLI
            workingDirectory: src/Stryker.CLI
          - name: Stryker.Core
            workingDirectory: src/Stryker.Core
          - name: Stryker.Configuration
            workingDirectory: src/Stryker.Configuration
          - name: Stryker.RegexMutators
            workingDirectory: src/Stryker.RegexMutators
          - name: Stryker.TestRunner
            workingDirectory: src/Stryker.TestRunner
          - name: Stryker.TestRunner.MicrosoftTestPlatform
            workingDirectory: src/Stryker.TestRunner.MicrosoftTestPlatform
          - name: Stryker.TestRunner.VsTest
            workingDirectory: src/Stryker.TestRunner.VsTest
          - name: Stryker.DataCollector
            workingDirectory: src/Stryker.DataCollector
          - name: Stryker.Solutions
            workingDirectory: src/Stryker.Solutions
          - name: Stryker.Utilities
            workingDirectory: src/Stryker.Utilities

    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Run Stryker
        shell: pwsh
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY || '' }}
          # Default to local-tool mode for scheduled runs (no input present).
          # Manual dispatch can override via the `useLocalTool` input.
          USE_LOCAL_TOOL: ${{ inputs.useLocalTool == false && 'false' || 'true' }}
        run: ./stryker-on-stryker.ps1 -WorkingDirectory "${{ matrix.workingDirectory }}"

      - name: Upload Stryker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-logs-${{ matrix.name }}
          path: ${{ matrix.workingDirectory }}/StrykerOutput/*/logs/
          if-no-files-found: ignore
