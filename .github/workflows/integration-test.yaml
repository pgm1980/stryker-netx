name: integration test
run-name: e2e ${{ github.head_ref || github.ref_name }}

# Sprint 4.10: re-enabled `pull_request` trigger after Sprint 4.2 fixed
# Bug-5 (mutation-engine project-reference handling). All NetCore + MTP
# categories now run to completion locally; CI matrix exercises them
# across Ubuntu / Windows / macOS.
#
# NetFramework category remains effectively Windows+nuget.exe-gated.
# `dotnet msbuild -restore` does NOT restore legacy packages.config —
# the upstream-provided FullFrameworkApp fixture uses that older flow.
# CI's `windows-latest` runner ships nuget.exe, so the matrix entry is
# left intact; local runs without nuget.exe will fail on that one
# category but the rest pass.
on:
  pull_request:
  workflow_dispatch:
    inputs:
      category:
        description: 'Category override (optional, runs full matrix if empty)'
        required: false

jobs:
  integration-test:
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        agent: [ubuntu-latest, windows-latest, macos-latest]
        category: [InitCommand, SingleTestProject, MultipleTestProjects, Solution, MSTestMTP, XUnitMTP, NUnitMTP, TUnit, MTPSolution, WebApiWithOpenApi]
        runtime: [netcore, netframework]
        exclude:
          - runtime: netframework
            agent: ubuntu-latest
          - runtime: netframework
            agent: macos-latest
          - runtime: netframework
            category: InitCommand
          - runtime: netframework
            category: MultipleTestProjects
          - runtime: netframework
            category: MSTestMTP
          - runtime: netframework
            category: XUnitMTP
          - runtime: netframework
            category: NUnitMTP
          - runtime: netframework
            category: TUnit
          - runtime: netframework
            category: MTPSolution
          - runtime: netframework
            category: WebApiWithOpenApi
    runs-on: ${{ matrix.agent }}
    env:
      CATEGORY: ${{ matrix.category }}
      RUNTIME: ${{ matrix.runtime }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x
      - name: Run integration tests
        shell: pwsh
        run: ./integration-tests.ps1

  # Fan-in job that depends on all matrix combinations
  # This job can be used as a single required check in PR rules
  integration-test-complete:
    name: Integration Tests Complete
    runs-on: ubuntu-latest
    needs: integration-test
    if: always()
    steps:
      - name: Check integration test results
        run: |
          if [ "${{ needs.integration-test.result }}" != "success" ]; then
            echo "Integration tests failed or were cancelled"
            exit 1
          fi
          echo "All integration tests passed successfully"
