name: ci
run-name: ci ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore (locked-mode)
        env:
          RestoreLockedMode: true
        run: dotnet restore stryker-netx.slnx

      - name: Build (TreatWarningsAsErrors)
        run: dotnet build stryker-netx.slnx --no-restore --configuration Debug

      - name: Test (xUnit + ArchUnitNET + FsCheck) — excludes E2E (separate job)
        # Sprint 23: --settings coverlet.runsettings excludes Stryker.DataCollector
        # from instrumentation (was causing parallel-testhost file-lock races).
        run: dotnet test stryker-netx.slnx --no-build --configuration Debug --collect:"XPlat Code Coverage" --settings coverlet.runsettings --logger "trx;LogFileName=test-results.trx" --filter "FullyQualifiedName!~Stryker.E2E.Tests"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: ignore

  e2e-test:
    name: e2e (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # E2E spawns Stryker.CLI as a subprocess against samples/Sample.slnx;
    # 10–15 cached runs per assembly, ~3 min wall-clock locally. Give
    # CI runners headroom because their I/O is slower.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore (locked-mode)
        env:
          RestoreLockedMode: true
        run: dotnet restore stryker-netx.slnx

      - name: Build Stryker.CLI (E2E target)
        # ProjectReference + ReferenceOutputAssembly=false on the E2E test project
        # already guarantees the CLI build, but a dedicated step makes failures
        # easier to attribute in CI logs.
        run: dotnet build src/Stryker.CLI/Stryker.CLI.csproj --no-restore --configuration Debug

      - name: Build Stryker.E2E.Tests
        run: dotnet build tests/Stryker.E2E.Tests/Stryker.E2E.Tests.csproj --no-restore --configuration Debug

      - name: E2E test run (Stryker-on-Sample subprocess)
        run: dotnet test tests/Stryker.E2E.Tests/Stryker.E2E.Tests.csproj --no-build --configuration Debug --logger "trx;LogFileName=e2e-results.trx"

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: '**/TestResults/e2e-results.trx'
          if-no-files-found: ignore

  semgrep:
    name: semgrep security scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep scan src/ + tests/
        run: semgrep scan --config auto --error src tests

  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [build-test, e2e-test, semgrep]
    if: always()
    steps:
      - name: Verify upstream jobs
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "build-test failed"
            exit 1
          fi
          if [ "${{ needs.e2e-test.result }}" != "success" ]; then
            echo "e2e-test failed"
            exit 1
          fi
          if [ "${{ needs.semgrep.result }}" != "success" ]; then
            echo "semgrep failed"
            exit 1
          fi
          echo "All CI checks passed."
